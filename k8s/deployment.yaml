apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sd-webui-data-claim
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sd-webui-rcom
  labels:
    app: sd-webui-rcom
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sd-webui-rcom
  template:
    metadata:
      labels:
        app: sd-webui-rcom
    spec:
      tolerations:
        - key: "ollama"
          operator: "Equal"
          value: "yes"
          effect: "NoSchedule"
      
      # INIT CONTAINER: Handles heavy dependency installation
      initContainers:
      - name: sd-webui-init
        image: ghcr.io/dvystrcil/stable-diffution-webui-rcom:main
        imagePullPolicy: Always
        command:
          - /bin/bash
          - -c
          - |
            echo "Starting dependency installation..."
            # Run webui.sh in background, capture all output to a log file
            ./webui.sh > /tmp/webui-init.log 2>&1 &
            WEBSITE_PID=$!
            
            echo "Waiting for WebUI to boot (installing dependencies)..."
            for i in {1..1800}; do
              # Check if webui.sh crashed
              if ! kill -0 $WEBSITE_PID 2>/dev/null; then
                echo "ERROR: webui.sh exited unexpectedly. Last 20 lines:"
                tail -n 20 /tmp/webui-init.log
                exit 1
              fi
              # Check if port 7860 is open
              if (echo > /dev/tcp/localhost/7860) 2>/dev/null; then
                echo "Dependencies installed and server is ready. Exiting init container."
                kill $WEBSITE_PID
                exit 0
              fi
              # Heartbeat log every 60 seconds
              if (( i % 60 == 0 )); then
                echo "Still waiting... ($i seconds elapsed)"
              fi
              sleep 1
            done
            
            echo "Init container timed out (30 mins). Last log lines:"
            tail -n 20 /tmp/webui-init.log
            exit 1
        env:
        - name: PIP_CACHE_DIR
          value: /app/pip-cache
        - name: COMMANDLINE_ARGS
          value: "--listen --port 7860 --skip-python-version-check --skip-torch-cuda-test"
        volumeMounts:
        - name: sd-webui-data
          mountPath: /app/models
        - name: sd-webui-data
          mountPath: /app/extensions
        - name: sd-webui-data
          mountPath: /app/venv
        - name: sd-webui-data
          mountPath: /app/pip-cache
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000

      containers:
      - name: sd-webui-rcom
        imagePullPolicy: Always
        image: ghcr.io/dvystrcil/stable-diffution-webui-rcom:main
        command:
          - /bin/bash
          - -c
          - |
            echo "Starting WebUI..."
            exec ./webui.sh "$@"
        ports:
        - containerPort: 7860
        env:
        - name: PIP_CACHE_DIR
          value: /app/pip-cache
        - name: COMMANDLINE_ARGS
          value: "--listen --port 7860 --skip-python-version-check --skip-torch-cuda-test"
        readinessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        volumeMounts:
        - name: sd-webui-data
          mountPath: /app/models
        - name: sd-webui-data
          mountPath: /app/extensions
        - name: sd-webui-data
          mountPath: /app/venv
        - name: sd-webui-data
          mountPath: /app/pip-cache
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      volumes:
      - name: sd-webui-data
        persistentVolumeClaim:
          claimName: sd-webui-data-claim
---
apiVersion: v1
kind: Service
metadata:
  name: sd-webui-rcom
spec:
  selector:
    app: sd-webui-rcom
  ports:
  - protocol: TCP
    port: 80
    targetPort: 7860
  type: ClusterIP
