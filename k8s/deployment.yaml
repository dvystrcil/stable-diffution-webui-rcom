---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: server
    app.kubernetes.io/instance: sd-webui-rcom
    app.kubernetes.io/name: sd-webui-rcom
    app.kubernetes.io/part-of: sd-webui-rcom
  name: sd-webui-rcom
  namespace: sd-webui-rcom
imagePullSecrets:
- name: sd-webui-rcom-harbor-pull
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sd-webui-data-claim
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sd-webui-rcom
  labels:
    app: sd-webui-rcom
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: sd-webui-rcom
  template:
    metadata:
      labels:
        app: sd-webui-rcom
    spec:
      tolerations:
        - key: "ollama"
          operator: "Equal"
          value: "yes"
          effect: "NoSchedule"
      serviceAccount: sd-webui-rcom
      serviceAccountName: sd-webui-rcom
      initContainers:
      - name: sd-webui-init
        image: harbor.sirddail.net/stable-diffusion/stable-diffution-webui-rcom:main
        imagePullPolicy: Always
        command:
          - /bin/bash
          - -c
          - |
            echo "Preparing persistent mounts..."
            mkdir -p /app/data/models /app/data/extensions /app/data/pip-cache

            [ -L /app/models ] || ln -s /app/data/models /app/models
            [ -L /app/extensions ] || ln -s /app/data/extensions /app/extensions

            echo "Starting dependency installation..."
            ./webui.sh > /tmp/webui-init.log 2>&1 &
            WEBSITE_PID=$!

            echo "Waiting for WebUI to boot..."
            for i in {1..1800}; do
              if ! kill -0 $WEBSITE_PID 2>/dev/null; then
                echo "ERROR: webui.sh exited. Last 20 lines:"
                tail -n 20 /tmp/webui-init.log
                exit 1
              fi
              if (echo > /dev/tcp/localhost/7860) 2>/dev/null; then
                echo "Dependencies installed and server is ready."
                kill $WEBSITE_PID
                exit 0
              fi
              if (( i % 60 == 0 )); then echo "Still waiting... ($i s)"; fi
              sleep 1
            done
            echo "Timed out (30 mins)."
            tail -n 20 /tmp/webui-init.log
            exit 1
        env:
        - name: venv_dir
          value: /app/data/venv
        - name: PIP_CACHE_DIR
          value: /app/data/pip-cache
        - name: COMMANDLINE_ARGS
          value: "--listen --port 7860 --skip-python-version-check --skip-torch-cuda-test"
        volumeMounts:
        - name: sd-webui-data
          mountPath: /app/data

      containers:
      - name: sd-webui-rcom
        imagePullPolicy: Always
        image: harbor.sirddail.net/stable-diffusion/stable-diffution-webui-rcom:main
        command:
          - /bin/bash
          - -c
          - |
            echo "Starting WebUI..."
            exec ./webui.sh "$@"
        ports:
        - containerPort: 7860
        env:
        - name: venv_dir
          value: /app/data/venv
        - name: PIP_CACHE_DIR
          value: /app/data/pip-cache
        - name: COMMANDLINE_ARGS
          value: "--listen --port 7860 --skip-python-version-check --skip-torch-cuda-test"
        readinessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        volumeMounts:
        - name: sd-webui-data
          mountPath: /app/data
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      volumes:
      - name: sd-webui-data
        persistentVolumeClaim:
          claimName: sd-webui-data-claim
---
apiVersion: v1
kind: Service
metadata:
  name: sd-webui-rcom
spec:
  selector:
    app: sd-webui-rcom
  ports:
  - protocol: TCP
    port: 80
    targetPort: 7860
  type: ClusterIP
