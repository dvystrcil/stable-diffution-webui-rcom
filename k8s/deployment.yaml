---
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/component: server
    app.kubernetes.io/instance: sd-webui-rcom
    app.kubernetes.io/name: sd-webui-rcom
    app.kubernetes.io/part-of: sd-webui-rcom
  name: sd-webui-rcom
  namespace: sd-webui-rcom
imagePullSecrets:
- name: sd-webui-rcom-harbor-pull
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sd-webui-data-claim
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sd-webui-rcom
  labels:
    app: sd-webui-rcom
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sd-webui-rcom
  template:
    metadata:
      labels:
        app: sd-webui-rcom
    spec:
      tolerations:
        - key: "ollama"
          operator: "Equal"
          value: "yes"
          effect: "NoSchedule"
      nodeSelector:
        amd.com/gpu.family: GC_11_5_0
      serviceAccount: sd-webui-rcom
      serviceAccountName: sd-webui-rcom
      initContainers:
      - name: sd-webui-init
        image: harbor.sirddail.net/stable-diffusion/stable-diffution-webui-rcom:dev
        imagePullPolicy: Always
        command:
          - /bin/bash
          - -c
          - |
            echo "Preparing persistent mounts..."
            mkdir -p /app/data/models/Stable-diffusion /app/data/extensions /app/data/pip-cache

            rm -rf /app/models && ln -s /app/data/models /app/models
            rm -rf /app/extensions && ln -s /app/data/extensions /app/extensions

            # --- model fetch (background, Harbor-first) ---
            MODEL_DIR=/app/data/models/Stable-diffusion
            HARBOR_MODEL="${HARBOR_MODEL_REF:-harbor.sirddail.net/stable-diffusion/models:sd-v1-5}"
            MODEL_FILE="${SD_MODEL_FILENAME:-v1-5-pruned-emaonly.safetensors}"
            MODEL_URL="${SD_MODEL_URL:-https://huggingface.co/stable-diffusion-v1-5/stable-diffusion-v1-5/resolve/main/v1-5-pruned-emaonly.safetensors}"
            DOWNLOAD_PID=""
            if [ -z "$(ls -A "$MODEL_DIR"/*.safetensors "$MODEL_DIR"/*.ckpt 2>/dev/null)" ]; then
              {
                echo "No model found. Trying Harbor cache first..."
                if oras pull --output "$MODEL_DIR" "$HARBOR_MODEL" 2>/dev/null; then
                  echo "Model pulled from Harbor."
                else
                  echo "Not in Harbor. Downloading from HuggingFace..."
                  wget -q --show-progress -O "$MODEL_DIR/$MODEL_FILE.tmp" "$MODEL_URL" \
                    && mv "$MODEL_DIR/$MODEL_FILE.tmp" "$MODEL_DIR/$MODEL_FILE" \
                    && echo "Download complete. Pushing to Harbor cache..." \
                    && cd "$MODEL_DIR" \
                    && oras push "$HARBOR_MODEL" "$MODEL_FILE" \
                    && echo "Pushed to Harbor." \
                    || { echo "ERROR: model fetch failed"; exit 1; }
                fi
              } &
              DOWNLOAD_PID=$!
            else
              echo "Model already present, skipping download."
            fi

            # --- venv + webui.sh (parallel with download) ---
            if [ ! -f /app/data/venv/bin/activate ] || \
               ! /app/data/venv/bin/python3 -c "import site" 2>/dev/null || \
               ! grep -q "include-system-site-packages = true" /app/data/venv/pyvenv.cfg 2>/dev/null; then
              echo "Creating/recovering venv (with system-site-packages for ROCm torch)..."
              mv /app/data/venv "/app/data/venv.old-$(date +%s)" 2>/dev/null || true
              python3 -m venv --system-site-packages /app/data/venv
            fi
            echo "Ensuring build deps..."
            /app/data/venv/bin/pip install --quiet "setuptools<70" wheel
            ./webui.sh > /tmp/webui-init.log 2>&1 &
            WEBSITE_PID=$!

            echo "Waiting for WebUI to boot..."
            for i in {1..1800}; do
              if ! kill -0 $WEBSITE_PID 2>/dev/null; then
                echo "ERROR: webui.sh exited. Last 20 lines:"
                tail -n 20 /tmp/webui-init.log
                exit 1
              fi
              if (echo > /dev/tcp/localhost/7860) 2>/dev/null; then
                echo "Dependencies installed and server is ready."
                kill $WEBSITE_PID
                break
              fi
              if (( i % 60 == 0 )); then echo "Still waiting... ($i s)"; fi
              sleep 1
            done

            # --- remove rocm5.7 torch; main container uses system rocm7.0 torch via .pth ---
            # PYTHONPATH prepends (breaks numpy/scipy), so we use a .pth file that appends
            # /opt/venv AFTER venv packages so venv's numpy 1.x is found first, but torch
            # 2.8.0+rocm7.0.2 is found since it is not in the venv.
            echo "Removing venv torch (rocm5.7) so system torch (rocm7.0.2) is used..."
            /app/data/venv/bin/pip uninstall -y torch torchvision torchaudio 2>/dev/null || true
            rm -rf /app/data/venv/lib/python3.12/site-packages/~orch* 2>/dev/null || true
            echo "/opt/venv/lib/python3.12/site-packages" \
              > /app/data/venv/lib/python3.12/site-packages/rocm-system-torch.pth
            echo "Torch removed; .pth file written."

            # --- wait for download before handing off ---
            if [ -n "$DOWNLOAD_PID" ]; then
              echo "Waiting for model download to finish..."
              wait $DOWNLOAD_PID || { echo "ERROR: model download failed"; exit 1; }
            fi
            exit 0
        env:
        - name: venv_dir
          value: /app/data/venv
        - name: PIP_CACHE_DIR
          value: /app/data/pip-cache
        - name: COMMANDLINE_ARGS
          value: "--listen --port 7860 --skip-python-version-check --skip-torch-cuda-test"
        - name: STABLE_DIFFUSION_REPO
          value: "https://github.com/w-e-w/stablediffusion.git"
        - name: DOCKER_CONFIG
          value: /docker-config
        - name: RUSTFLAGS
          value: "--cap-lints allow"
        volumeMounts:
        - name: sd-webui-data
          mountPath: /app/data
        - name: docker-config
          mountPath: /docker-config
          readOnly: true

      containers:
      - name: sd-webui-rcom
        imagePullPolicy: Always
        image: harbor.sirddail.net/stable-diffusion/stable-diffution-webui-rcom:dev
        command:
          - /bin/bash
          - -c
          - |
            rm -rf /app/models && ln -s /app/data/models /app/models
            rm -rf /app/extensions && ln -s /app/data/extensions /app/extensions
            echo "=== Pre-flight GPU test ===" && \
            /app/data/venv/bin/python3 -c "import torch; print('torch:', torch.__version__); print('cuda:', torch.cuda.is_available()); t=torch.zeros(4,device='cuda') if torch.cuda.is_available() else None; t2=torch.ones(4).cuda() if torch.cuda.is_available() else None; print('GPU tensors OK:', t, t2)" && \
            echo "=== GPU OK ===" || echo "=== GPU FAILED ==="
            exec ./webui.sh
        ports:
        - containerPort: 7860
        env:
        - name: venv_dir
          value: /app/data/venv
        - name: PIP_CACHE_DIR
          value: /app/data/pip-cache
        - name: COMMANDLINE_ARGS
          value: "--listen --port 7860 --skip-python-version-check --skip-torch-cuda-test --skip-install"
        - name: STABLE_DIFFUSION_REPO
          value: "https://github.com/w-e-w/stablediffusion.git"
        - name: HSA_OVERRIDE_GFX_VERSION
          value: "11.5.1"
        - name: HSA_ENABLE_SDMA
          value: "0"
        readinessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        resources:
          limits:
            amd.com/gpu: "1"
          requests:
            amd.com/gpu: "1"
        volumeMounts:
        - name: sd-webui-data
          mountPath: /app/data
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        supplementalGroups: [44, 109, 993]
        seccompProfile:
          type: Unconfined
      volumes:
      - name: sd-webui-data
        persistentVolumeClaim:
          claimName: sd-webui-data-claim
      - name: docker-config
        secret:
          secretName: sd-webui-rcom-harbor-pull
          items:
          - key: .dockerconfigjson
            path: config.json
---
apiVersion: v1
kind: Service
metadata:
  name: sd-webui-rcom
spec:
  selector:
    app: sd-webui-rcom
  ports:
  - protocol: TCP
    port: 80
    targetPort: 7860
  type: ClusterIP
