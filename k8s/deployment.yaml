apiVersion: apps/v1
kind: Deployment
metadata:
  name: stable-diffusion-webui
  labels:
    app: stable-diffusion-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stable-diffusion-webui
  template:
    metadata:
      labels:
        app: stable-diffusion-webui
    spec:
      containers:
      - name: stable-diffusion-webui
        image: ghcr.io/your-username/stable-diffution-rcom:latest # Update with your actual registry and image
        ports:
        - containerPort: 7860
        env:
        - name: COMMANDLINE_ARGS
          value: "--listen --port 7860"
        resources:
          requests:
            memory: "4Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "2000m"
        readinessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 180
          periodSeconds: 30
          timeoutSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: stable-diffusion-webui-service
spec:
  selector:
    app: stable-diffusion-webui
  ports:
  - protocol: TCP
    port: 80
    targetPort: 7860
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stable-diffusion-webui-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  rules:
  - host: stable-diffusion.your-domain.com # Update with your actual domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: stable-diffusion-webui-service
            port:
              number: 80
