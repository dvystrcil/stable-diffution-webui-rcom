apiVersion: apps/v1
kind: Deployment
metadata:
  name: stable-diffusion-webui
  labels:
    app: stable-diffusion-webui
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stable-diffusion-webui
  template:
    metadata:
      labels:
        app: stable-diffusion-webui
    spec:
      containers:
      - name: stable-diffusion-webui
        image: ghcr.io/dvystrcil/stable-diffution-webui-rcom:main
        ports:
        - containerPort: 7860
        env:
        - name: COMMANDLINE_ARGS
          value: "--listen --port 7860"
        resources:
          requests:
            memory: "4Gi"
            cpu: "1000m"            
          limits:
            memory: "8Gi"
            cpu: "2000m"
            amd.com/gpu: 1
        readinessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 180
          periodSeconds: 30
          timeoutSeconds: 10
        volumeMounts:
        # - name: ollama-claim
        #   mountPath: /root/.ollama
        - mountPath: /dev/kfd
          name: kfd
        - mountPath: /dev/dri
          name: dri
      volumes:
      - name: kfd
        hostPath:
          path: /dev/kfd
      - name: dri
        hostPath:
          path: /dev/dri
---
apiVersion: v1
kind: Service
metadata:
  name: stable-diffusion-webui
spec:
  selector:
    app: stable-diffusion-webui
  ports:
  - protocol: TCP
    port: 80
    targetPort: 7860
  type: ClusterIP

