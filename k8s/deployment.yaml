apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sd-webui-data-claim
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sd-webui-rcom
  labels:
    app: sd-webui-rcom
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sd-webui-rcom
  template:
    metadata:
      labels:
        app: sd-webui-rcom
    spec:
      tolerations:
        - key: "ollama"
          operator: "Equal"
          value: "yes"
          effect: "NoSchedule"
      containers:
      - name: sd-webui-rcom
        imagePullPolicy: Always
        image: ghcr.io/dvystrcil/stable-diffution-webui-rcom:main
        
        # Override Dockerfile CMD to pass --skip-venv directly to webui.sh
        command: ["/bin/bash", "./webui.sh", "--skip-venv"]
        
        ports:
        - containerPort: 7860
        env:
        - name: COMMANDLINE_ARGS
          value: "--listen --port 7860"
        # Bypass Ubuntu 24.04 PEP 668 restriction when webui.sh runs pip install
        - name: PIP_BREAK_SYSTEM_PACKAGES
          value: "1"
        readinessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 180
          periodSeconds: 30
          timeoutSeconds: 10
        volumeMounts:
        - name: sd-webui-data
          mountPath: /app/models
        - name: sd-webui-data
          mountPath: /app/extensions
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      volumes:
      - name: sd-webui-data
        persistentVolumeClaim:
          claimName: sd-webui-data-claim
---
apiVersion: v1
kind: Service
metadata:
  name: sd-webui-rcom
spec:
  selector:
    app: sd-webui-rcom
  ports:
  - protocol: TCP
    port: 80
    targetPort: 7860
  type: ClusterIP
