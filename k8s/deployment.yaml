apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sd-webui-data-claim
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sd-webui-rcom
  labels:
    app: sd-webui-rcom
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 0
  selector:
    matchLabels:
      app: sd-webui-rcom
  template:
    metadata:
      labels:
        app: sd-webui-rcom
    spec:
      tolerations:
        - key: "ollama"
          operator: "Equal"
          value: "yes"
          effect: "NoSchedule"
      containers:
      - name: sd-webui-rcom
        imagePullPolicy: Always
        image: ghcr.io/dvystrcil/stable-diffution-webui-rcom:main
        
        # Pre-boot venv if missing, then hand off to webui.sh
        command:
          - /bin/bash
          - -c
          - |
            if [ ! -f /app/venv/bin/activate ]; then
              echo "Bootstrapping venv..."
              python3 -m venv /app/venv
            fi
            exec ./webui.sh "$@"
        
        ports:
        - containerPort: 7860
        env:
        - name: COMMANDLINE_ARGS
          value: "--listen --port 7860 --skip-python-version-check --skip-torch-cuda-test"
        - name: PIP_BREAK_SYSTEM_PACKAGES
          value: "1"
        readinessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 180
          periodSeconds: 30
          timeoutSeconds: 10
        volumeMounts:
        - name: sd-webui-data
          mountPath: /app/models
        - name: sd-webui-data
          mountPath: /app/extensions
        - name: sd-webui-data
          mountPath: /app/venv
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      volumes:
      - name: sd-webui-data
        persistentVolumeClaim:
          claimName: sd-webui-data-claim
---
apiVersion: v1
kind: Service
metadata:
  name: sd-webui-rcom
spec:
  selector:
    app: sd-webui-rcom
  ports:
  - protocol: TCP
    port: 80
    targetPort: 7860
  type: ClusterIP
