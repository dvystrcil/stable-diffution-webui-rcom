name: Build and Push Docker Image

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
    paths-ignore:
      - 'k8s/**'
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'k8s/**'
      - '*.md'
      - 'docs/**'
  workflow_dispatch:

env:
  REGISTRY: harbor.sirddail.net
  INTERNAL_REGISTRY: harbor-registry.harbor.svc.cluster.local:5000
  PROJECT: stable-diffusion
  IMAGE_NAME: stable-diffution-webui-rcom

jobs:
  build:
    runs-on: stable-diffution-webui-rcom-runner
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Extract Harbor credentials
      id: creds
      run: |
        HARBOR_AUTH=$(cat /home/runner/.docker/config.json | python3 -c "import sys,json,base64; d=json.load(sys.stdin); a=d['auths']['harbor.sirddail.net']['auth']; t=base64.b64decode(a).decode(); u,p=t.split(':',1); print(u+' '+p)")
        HARBOR_USER=$(echo $HARBOR_AUTH | cut -d' ' -f1)
        HARBOR_PASS=$(echo $HARBOR_AUTH | cut -d' ' -f2)
        echo "username=$HARBOR_USER" >> $GITHUB_OUTPUT
        echo "password=$HARBOR_PASS" >> $GITHUB_OUTPUT

    - name: Log in to Harbor
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ steps.creds.outputs.username }}
        password: ${{ steps.creds.outputs.password }}

    - name: Create buildkitd config
      run: printf '[registry."harbor-registry.harbor.svc.cluster.local:5000"]\n  http = true\n  insecure = true\n' > /tmp/buildkitd.toml

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        buildkitd-config: /tmp/buildkitd.toml

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          STABLE_DIFFUSION_TAG=v1.10.1
        cache-from: type=registry,ref=${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:buildcache
        cache-to: type=registry,ref=${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

    - name: Test image
      if: github.event_name != 'pull_request'
      run: |
        docker run --rm ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --help || true
