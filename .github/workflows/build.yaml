name: Build and Push Docker Image

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
    paths-ignore:
      - 'k8s/**'
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'k8s/**'
      - '*.md'
      - 'docs/**'
  workflow_dispatch:

env:
  INTERNAL_REGISTRY: harbor-core.harbor.svc.cluster.local:80
  EXTERNAL_REGISTRY: harbor.sirddail.net
  PROJECT: stable-diffusion
  IMAGE_NAME: stable-diffution-webui-rcom

jobs:
  build:
    runs-on: stable-diffution-webui-rcom-runner
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Verify Harbor credentials
      run: |
        echo "Docker config exists: $(test -f ~/.docker/config.json && echo yes || echo no)"
        cat ~/.docker/config.json | python3 -c "import sys,json; d=json.load(sys.stdin); print('Registries:', list(d['auths'].keys()))"

    - name: Create buildkitd config
      run: |
        printf '[registry."harbor-core.harbor.svc.cluster.local:80"]\n  http = true\n  insecure = true\n' > /tmp/buildkitd.toml
        cat /tmp/buildkitd.toml

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        buildkitd-config: /tmp/buildkitd.toml

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.EXTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          STABLE_DIFFUSION_TAG=v1.10.1
        cache-from: type=registry,ref=${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:buildcache
        cache-to: type=registry,ref=${{ env.INTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

    - name: Test image
      if: github.event_name != 'pull_request'
      run: |
        docker run --rm ${{ env.EXTERNAL_REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --help || true
