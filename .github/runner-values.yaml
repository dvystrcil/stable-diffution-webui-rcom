githubConfigUrl: "https://github.com/dvystrcil/stable-diffution-webui-rcom/"
runnerScaleSetName: "stable-diffution-webui-rcom-runner"
minRunners: 0
maxRunners: 3

template:
  spec:
    initContainers:
    - name: init-dind-externals
      image: ghcr.io/actions/actions-runner:latest
      command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
      volumeMounts:
      - name: dind-externals
        mountPath: /home/runner/tmpDir
    - name: init-docker-config
      image: ghcr.io/actions/actions-runner:latest
      command:
      - sh
      - -c
      - |
        mkdir -p /home/runner/.docker
        cp /harbor-creds/config.json /home/runner/.docker/config.json
        chmod 600 /home/runner/.docker/config.json
        mkdir -p /etc/docker/certs.d/harbor-core.harbor.svc.cluster.local
        cp /harbor-ca/ca.crt /etc/docker/certs.d/harbor-core.harbor.svc.cluster.local/ca.crt
      volumeMounts:
      - name: harbor-creds
        mountPath: /harbor-creds
        readOnly: true
      - name: docker-config
        mountPath: /home/runner/.docker
      - name: harbor-ca
        mountPath: /harbor-ca
        readOnly: true
      - name: docker-certs
        mountPath: /etc/docker/certs.d
    containers:
    - name: runner
      image: ghcr.io/actions/actions-runner:latest
      command: ["/home/runner/run.sh"]
      env:
      - name: DOCKER_HOST
        value: unix:///var/run/docker.sock
      volumeMounts:
      - name: work
        mountPath: /home/runner/_work
      - name: dind-sock
        mountPath: /var/run
      - name: dind-externals
        mountPath: /home/runner/externals
      - name: docker-config
        mountPath: /home/runner/.docker
      - name: docker-certs
        mountPath: /etc/docker/certs.d
    - name: dind
      image: docker:dind
      args:
      - dockerd
      - --host=unix:///var/run/docker.sock
      - --group=123
      securityContext:
        privileged: true
      volumeMounts:
      - name: work
        mountPath: /home/runner/_work
      - name: dind-sock
        mountPath: /var/run
      - name: dind-externals
        mountPath: /home/runner/externals
      - name: docker-certs
        mountPath: /etc/docker/certs.d
    volumes:
    - name: work
      emptyDir: {}
    - name: dind-sock
      emptyDir: {}
    - name: dind-externals
      emptyDir: {}
    - name: docker-config
      emptyDir: {}
    - name: docker-certs
      emptyDir: {}
    - name: harbor-creds
      secret:
        secretName: sd-runner-harbor-pull
        items:
        - key: .dockerconfigjson
          path: config.json
    - name: harbor-ca
      configMap:
        name: harbor-internal-ca
